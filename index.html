<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Eque</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <div class="ipod">
            <div class="topbar">
                <h1>Eque</h1>
                <div class="theme-toggle">
                    <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                    </div>
                </div>
            </div>

            <div class="screen">
                <div class="album-art">
                    <img src="placeholder.jpg" alt="Album art" id="albumArt">
                </div>
                <div class="song-info">
                    <p class="song-title" id="songTitle">No song playing</p>
                    <p class="song-artist" id="songArtist">Add song to get started</p>
                </div>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill">
                        <div class="progress-thumb"></div>
                    </div>
                </div>
                <span id="totalTime">0:00</span>
            </div>
            <div class="controls">
                <button class="btn-control" id="prevBtn">
                    <i class="fa-solid fa-backward-step"></i>
                </button>
                <button class="btn-control" id="shuffleBtn">
                    <i class="fa-solid fa-shuffle"></i>
                </button>
                <button class="btn-control btn-play" id="playBtn">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button class="btn-control" id="repeatBtn">
                    <i class="fa-solid fa-repeat"></i>
                </button>
                <button class="btn-control" id="nextBtn">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
            </div>
            <div class="queue">
                <h2>Up Next</h2>
                <ul id="queueList">
                    <li class="queue-empty">No songs in queue</li>
                </ul>
            </div>
            <div class="spotify-connect">
                <button class="btn-spotify" id="connectBtn">
                    <i class="fa-brands fa-spotify"></i>
                    Connect to Spotify
                </button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
