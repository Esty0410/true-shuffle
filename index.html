<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>eque</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="intro" id="intro">
            <h1 class="intro-logo">eque</h1>
        </div>
        <div class="ipod">
            <div class="topbar">
                <h1>eque</h1>
                <div class="theme-toggle">
                    <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                    </div>
                </div>
            </div>
            <div class="screen-playlists" id="screenPlaylists">
                <div class="mini-player" id="miniPlayer" style="display:none">
                    <div class="mini-player-info">
                        <span id="miniTitle">no song playing</span>
                    </div>
                    <button class="btn-control" id="miniPlayBtn">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
                <div class="queue">
                    <ul id="queueList">
                        <li class="queue-empty">no songs in queue</li>
                    </ul>
                </div>
                <div class="spotify-connect">
                    <button class="btn-spotify" id="connectBtn">
                        <i class="fa-brands fa-spotify"></i>
                        connect to spotify
                    </button>
                </div>
            </div>
            <div class="screen-queue" id="screenQueue">
                <div class="mini-player" id="miniPlayer2" style="display:none">
                    <div class="mini-player-info">
                        <span id="miniTitle2">no song playing</span>
                    </div>
                    <button class="btn-control" id="miniPlayBtn2">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
                <div class="screen-nav">
                    <button class="btn-back" id="backToPlaylists">
                        <i class="fa-solid fa-chevron-left"></i> menu
                    </button>
                    <button class="btn-back" id="goToNowPlaying">
                        now playing  <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                <div class="queue-header">
                    <h2>songs</h2>
                    <button class="btn-control" id="shuffleQueueBtn">
                        <i class="fa-solid fa-shuffle"></i>
                    </button>
                </div>
                <ul id="songList">

                </ul>
            </div>
            <div class="screen-nowplaying" id="screenNowPlaying">
                <button class="btn-back" id="backToQueue">
                    <i class="fa-solid fa-chevron-left"></i> menu
                </button>
                <div class="song-info">
                        <p class="song-title" id="songTitle">no song playing</p>
                        <p class="song-artist" id="songArtist">add song to get started</p>
                </div>
                <div class="screen">
                    <div class="album-art" id="albumArtContainer">
                        <img alt="Album art" id="albumArt" style="display:none">
                        <div class="album-placeholder" id="albumPlaceholder">
                            <i class="fa-solid fa-music"></i>
                        </div>
                    </div>
                </div>
                <div class="progress-container">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill">
                            <div class="progress-thumb"></div>
                        </div>
                    </div>
                    <span id="totalTime">0:00</span>
                </div>
                <div class="controls">
                    <button class="btn-control" id="prevBtn">
                        <i class="fa-solid fa-backward-step"></i>
                    </button>
                    <button class="btn-control btn-play" id="playBtn">
                        <i class="fa-solid fa-play"></i>
                    </button>
                    <button class="btn-control" id="nextBtn">
                        <i class="fa-solid fa-forward-step"></i>
                    </button>
                </div>
                <div class="queue-panel">
                    <button class="queue-panel-toggle" id="queuePanelBtn">
                        <i class="fa-solid fa-chevron-down"></i> current playlist
                    </button>
                    <ul class="queue-panel-list" id="nowPlayingQueue" style="display:none">
                    </ul>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
